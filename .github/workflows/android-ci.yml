name: Android CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --console=plain

      - name: Lint
        run: ./gradlew :app:lintDebug --console=plain

      - name: Release build
        run: ./gradlew :app:assembleRelease --console=plain

      - name: Upload lint and test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-reports
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
            app/build/reports/tests/testDebugUnitTest

  connected-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: verify
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Run connected Android tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          script: ./gradlew :app:connectedDebugAndroidTest --console=plain

      - name: Upload connected test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-connected-test-reports
          path: |
            app/build/reports/androidTests/connected
            app/build/outputs/androidTest-results

